services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: habit-tracker-frontend
    ports:
      - "8001:3000"
    volumes:
      - ./static:/usr/share/nginx/html/static:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=3000

  api:
    build: .
    container_name: habit-tracker-api
    ports:
      - "8000:8000"
    expose:
      - "8000"
    volumes:
      - ./src:/app/src
      - ./templates:/app/templates
      - ./static:/app/static
    environment:
      - APP_ENV=docker
      - DATABASE_URL=${DATABASE_URL}
      - DB_HOST=${DB_HOST}
      - AWS_ENDPOINT_URL=${AWS_ENDPOINT_URL}
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - SECRET_KEY=${SECRET_KEY}
      - JAEGER_HOST=jaeger
      - JAEGER_PORT=6831
      - ENABLE_TRACING=${ENABLE_TRACING}
      - PROMETHEUS_URL=${PROMETHEUS_URL}
      - GRAFANA_URL=${GRAFANA_URL}
      - JAEGER_URL=${JAEGER_URL}
      - S3_URL=${S3_URL}
      - ARGOCD_URL=${ARGOCD_URL}
      - API_RELOAD=${API_RELOAD}
    depends_on:
      - db
      - localstack
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  db:
    image: postgres:16
    container_name: habit-tracker-db
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=habits
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 10s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:2.0.2
    container_name: habit-tracker-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - DEBUG=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    container_name: habit-tracker-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - api

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: habit-tracker-jaeger
    ports:
      - "16686:16686"
      - "6831:6831/udp"
    environment:
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411

  grafana:
    image: grafana/grafana:latest
    container_name: habit-tracker-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

  # ArgoCD - Optional (ARM uyumluluğu sorunu nedeniyle devre dışı)
  # argocd:
  #   image: argoproj/argocd:latest
  #   container_name: habit-tracker-argocd
  #   ports:
  #     - "8080:8080"
  #     - "8443:8443"
  #   environment:
  #     - ARGOCD_SERVER_INSECURE=true
  #   volumes:
  #     - argocd_data:/var/lib/argocd

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  # argocd_data:
