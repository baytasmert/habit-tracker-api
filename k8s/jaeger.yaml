---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: default
  labels:
    app: jaeger
spec:
  type: ClusterIP
  ports:
  # OTLP gRPC receiver
  - port: 4317
    targetPort: 4317
    protocol: TCP
    name: otlp-grpc
  # OTLP HTTP receiver
  - port: 4318
    targetPort: 4318
    protocol: TCP
    name: otlp-http
  # Jaeger Thrift compact
  - port: 6831
    targetPort: 6831
    protocol: UDP
    name: jaeger-thrift
  # Jaeger gRPC
  - port: 14250
    targetPort: 14250
    protocol: TCP
    name: jaeger-grpc
  # Jaeger HTTP collector
  - port: 14268
    targetPort: 14268
    protocol: TCP
    name: jaeger-http
  # Jaeger UI
  - port: 16686
    targetPort: 16686
    protocol: TCP
    name: jaeger-ui
  selector:
    app: jaeger

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: default
  labels:
    app: jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
      - name: jaeger
        image: jaegertracing/all-in-one:latest
        imagePullPolicy: IfNotPresent
        ports:
        # OTLP
        - containerPort: 4317
          name: otlp-grpc
        - containerPort: 4318
          name: otlp-http
        # Jaeger Thrift
        - containerPort: 6831
          protocol: UDP
          name: jaeger-thrift
        # Jaeger gRPC
        - containerPort: 14250
          name: jaeger-grpc
        # Jaeger HTTP
        - containerPort: 14268
          name: jaeger-http
        # UI
        - containerPort: 16686
          name: jaeger-ui
        env:
        - name: COLLECTOR_ZIPKIN_HOST_PORT
          value: ":9411"
        - name: COLLECTOR_OTLP_ENABLED
          value: "true"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 16686
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 16686
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: jaeger-ui
  namespace: default
  labels:
    app: jaeger
spec:
  type: NodePort
  ports:
  - port: 16686
    targetPort: 16686
    nodePort: 30686
  selector:
    app: jaeger
