server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static files - direkt sun
    location /static/ {
        expires 1d;
        add_header Cache-Control "public, immutable";
        alias /usr/share/nginx/html/static/;
    }

    # Template pages - from static/templates/
    location ~ ^/(login|register|home|dashboard|habits|profile|admin|tips|create_habit|habit_detail|logout)/?$ {
        try_files /static/templates/$uri.html /static/templates/$uri /index.html;
    }

    # SPA - index.html'e yönlendir
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Health check
    location /_health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
